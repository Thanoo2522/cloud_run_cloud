<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>สมัครสมาชิก</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: Arial; max-width: 400px; margin: auto; padding: 20px; }
    h2 { text-align: center; font-size: 20px; }
    input { width: 100%; padding: 10px; margin: 6px 0; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; font-size: 16px; background: #06c755; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #status { text-align: center; color: red; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>

<h2>สมัครสมาชิก</h2>
<div id="status"></div> <!-- สำหรับแจ้งเตือนสถานะ -->

<input id="name" placeholder="ชื่อติดต่อ">
<input id="home" placeholder="ชื่อหมู่บ้าน">
<input id="address" placeholder="ที่อยู่">
<input id="phone" placeholder="เบอร์โทร">

<button id="btn-reg" onclick="register()">สมัคร</button>

<script>
let API_URL = ""
let LIFF_ID = ""
let OFM = ""
const BASE_URL = "https://server-ofm-419896870147.asia-southeast1.run.app"

// ✅ ดึง OFM แบบกันหาย (SessionStorage)
// ================= GET OFM (แก้ไขใหม่) =================
function getOfmFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  let ofm = urlParams.get("ofm");

  if (ofm) {
    console.log("Found OFM in URL:", ofm);
    localStorage.setItem("ofm_backup", ofm); // บันทึกไว้กันเหนียว
    return ofm;
  }

  // ถ้าใน URL ไม่มี ให้ไปดึงจากที่เคยบันทึกไว้
  const backup = localStorage.getItem("ofm_backup");
  console.log("Found OFM in Storage:", backup);
  return backup;
}

// ================= INIT (ปรับปรุงการแสดง Error) =================
async function initApp() {
  const statusDiv = document.getElementById("status"); // อย่าลืมสร้าง <div id="status"></div> ใน body
  try {
    OFM = getOfmFromUrl();

    if (!OFM) {
      statusDiv.innerText = "❌ ไม่พบรหัสร้านค้า (ofm) กรุณาเข้าผ่านลิงก์ที่มี ?ofm=... ต่อท้าย";
      return;
    }

    console.log("Current OFM:", OFM);

    // ✅ ส่งไป Flask โดยใช้ encodeURIComponent ป้องกันภาษาไทยเพี้ยน
    const res = await fetch(`${BASE_URL}/config/${encodeURIComponent(OFM)}`);
    
    if (!res.ok) {
        const errorData = await res.json();
        statusDiv.innerText = `❌ Error: ${errorData.message || 'เชื่อมต่อ Server ไม่ได้'}`;
        return;
    }

    const config = await res.json();
    console.log("Config from server:", config);

    // เช็คค่าจาก JSON ที่ Server ส่งมา (ต้องตรงกับใน Firestore)
    LIFF_ID = config.liffId ? config.liffId.trim() : "";
    API_URL = config.apiUrl ? config.apiUrl.trim() : "";

    if (!LIFF_ID) {
      statusDiv.innerText = "❌ ร้านนี้ยังไม่ได้ตั้งค่า liffId ในระบบ";
      return;
    }

    // ✅ เริ่ม LIFF
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
    } else {
      statusDiv.innerText = "✅ เชื่อมต่อร้าน: " + OFM;
      statusDiv.style.color = "green";
    }

  } catch (err) {
    console.error("INIT ERROR:", err);
    statusDiv.innerText = "❌ ระบบขัดข้อง: " + err.message;
  }
}


 

initApp()

async function register() {
  try {
    const btn = document.getElementById("btn-reg")
    const profile = await liff.getProfile()
    const name = document.getElementById("name").value
    const home = document.getElementById("home").value
    const address = document.getElementById("address").value
    const phone = document.getElementById("phone").value

    if (!name || !home || !address || !phone) {
      alert("กรุณากรอกข้อมูลให้ครบ")
      return
    }

    btn.disabled = true
    const data = { ofm: OFM, userId: profile.userId, name, home, address, phone }

    const res = await fetch(`${BASE_URL}/register`, { // เปลี่ยนไปยิงที่ Flask โดยตรงชัวร์กว่า
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })

    const json = await res.json()
    if (json.status === "ok") {
      alert("สมัครสำเร็จ ✅")
      liff.closeWindow()
    } else {
      alert("สมัครไม่สำเร็จ ❌: " + json.message)
      btn.disabled = false
    }
  } catch (err) {
    alert("สมัครไม่สำเร็จ ❌")
    document.getElementById("btn-reg").disabled = false
  }
}
</script>
</body>
</html>
