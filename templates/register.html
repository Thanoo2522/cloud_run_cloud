<!DOCTYPE html>
<html>
<head>
  <title>สมัครสมาชิก</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อ"><br><br>
<input id="phone" placeholder="เบอร์โทร"><br><br>

<button onclick="register()">สมัคร</button>

<script>
let userProfile = null

async function main() {
  try {
    await liff.init({ liffId: "2009858553-w282abVT" })

    // 🔥 ต้อง login ก่อนทุกครั้ง
    if (!liff.isLoggedIn()) {
      liff.login()
      return
    }

    // 🔥 เก็บ profile ไว้ใช้
    userProfile = await liff.getProfile()

    console.log("PROFILE:", userProfile)

  } catch (err) {
    console.error("LIFF ERROR:", err)
  }
}

main()

async function register() {
  try {

    if (!userProfile) {
      userProfile = await liff.getProfile()
    }

    const name = document.getElementById("name").value.trim()
    const phone = document.getElementById("phone").value.trim()

    if (!name || !phone) {
      alert("กรุณากรอกข้อมูลให้ครบ")
      return
    }

    const data = {
      userId: userProfile.userId,
      name: name,
      phone: phone
    }

    console.log("SEND TO SERVER:", data)

    const res = await fetch(
      "https://server-ofm-419896870147.asia-southeast1.run.app/register",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      }
    )

    const text = await res.text()   // 🔥 กันกรณี JSON error
    console.log("RAW RESPONSE:", text)

    let json
    try {
      json = JSON.parse(text)
    } catch (e) {
      throw new Error("Server ไม่ได้ส่ง JSON กลับ")
    }

    if (json.status === "ok") {
      alert("สมัครสำเร็จ ✅")
      liff.closeWindow() // 🔥 ปิดหน้า LIFF
    } else {
      alert("สมัครไม่สำเร็จ ❌")
      console.log(json)
    }

  } catch (err) {
    console.error("REGISTER ERROR:", err)
    alert("สมัครไม่สำเร็จ ❌ " + err.message)
  }
}
</script>

</body>
</html>
