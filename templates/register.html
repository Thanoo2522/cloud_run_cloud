<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>สมัครสมาชิก</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      font-size: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อติดต่อ">
<input id="home" placeholder="ชื่อหมู่บ้าน">
<input id="add" placeholder="ที่อยู่">
<input id="phone" placeholder="เบอร์โทร">

<button onclick="register()">สมัคร</button>

<script>

let API_URL = ""
let LIFF_ID = ""
let OFM = ""

async function initApp() {
  try {
    // 🔥 อ่าน ofm จาก URL เช่น ?ofm=เชียงกลมออนไลน์
    const urlParams = new URLSearchParams(window.location.search)
    OFM = urlParams.get("ofm")

    if (!OFM) {
      alert("ไม่พบ ofm")
      return
    }

    // 🔥 ดึง config จาก Flask
    const res = await fetch(`/get_liff_config?ofm=${OFM}`)
    const config = await res.json()

    console.log("CONFIG:", config)

    API_URL = config.apiUrl
    LIFF_ID = config.liffId

    // 🔥 init LIFF
    await liff.init({ liffId: LIFF_ID })

    if (!liff.isLoggedIn()) {
      liff.login()
    }

  } catch (err) {
    console.error(err)
    alert("โหลด config ไม่สำเร็จ")
  }
}

initApp()

async function register() {
  try {
    const profile = await liff.getProfile()

    const name = document.getElementById("name").value
    const home = document.getElementById("home").value
    const add = document.getElementById("add").value
    const phone = document.getElementById("phone").value

    if (!name || !home || !add || !phone) {
      alert("กรุณากรอกข้อมูลให้ครบ")
      return
    }

    const data = {
      userId: profile.userId,
      name: name,
      home: home,
      address: add,
      phone: phone,
      ofm: OFM
    }

    console.log("SEND:", data)

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    })

    if (!res.ok) {
      throw new Error("HTTP " + res.status)
    }

    const json = await res.json()

    console.log("RESULT:", json)

    if (json.status === "ok") {
      alert("สมัครสำเร็จ ✅")
      liff.closeWindow()
    } else {
      alert("สมัครไม่สำเร็จ ❌")
    }

  } catch (err) {
    console.error(err)
    alert("สมัครไม่สำเร็จ ❌")
  }
}

</script>

</body>
</html>
