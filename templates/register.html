<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>สมัครสมาชิก</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 14px;
      padding: 15px;
    }

    h3 {
      margin-bottom: 15px;
    }

    input {
      font-size: 14px;
      padding: 8px;
      width: 100%;
      max-width: 300px;
      margin-bottom: 10px;
    }

    button {
      font-size: 14px;
      padding: 10px 20px;
      background-color: #06C755;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #05a94a;
    }
  </style>
</head>

<body>

<h3>สมัครสมาชิก</h3>

<input id="name" placeholder="ชื่อติดต่อ">
<input id="home" placeholder="ชื่อหมู่บ้าน">
<input id="address" placeholder="ที่อยู่">
<input id="phone" placeholder="เบอร์โทร">

<br>
<button onclick="register()">สมัคร</button>

<script>

let LIFF_ID = ""
let API_URL = ""
let OFM = ""

// 🔥 อ่านค่าจาก URL
function getParams() {
  const params = new URLSearchParams(window.location.search)
  return {
    ofm: params.get("ofm"),
    server: params.get("server")
  }
}

// 🔥 โหลด config จาก Flask → Firebase
async function loadConfig() {
  try {
    const p = getParams()

    OFM = p.ofm
    const SERVER = p.server

    if (!OFM) {
      alert("❌ ไม่พบ ofm")
      return
    }

    if (!SERVER) {
      alert("❌ ไม่พบ server")
      return
    }

    console.log("OFM:", OFM)
    console.log("SERVER:", SERVER)

    const res = await fetch(`${SERVER}/config?ofm=${OFM}`)
    const json = await res.json()

    console.log("CONFIG:", json)

    if (json.status !== "ok") {
      alert("❌ โหลด config ไม่สำเร็จ")
      return
    }

    LIFF_ID = json.liffId
    API_URL = json.apiUrl

    // 🔥 init LIFF
    await liff.init({ liffId: LIFF_ID })

    if (!liff.isLoggedIn()) {
      liff.login()
    }

  } catch (err) {
    console.error(err)
    alert("❌ โหลด config error")
  }
}

loadConfig()

// 🔥 สมัครสมาชิก
async function register() {
  try {
    const profile = await liff.getProfile()

    const data = {
      ofm: OFM,
      userId: profile.userId,
      name: document.getElementById("name").value,
      home: document.getElementById("home").value,
      address: document.getElementById("address").value,
      phone: document.getElementById("phone").value
    }

    // 🔥 validation
    if (!data.name || !data.phone) {
      alert("กรุณากรอกชื่อและเบอร์โทร")
      return
    }

    console.log("SEND:", data)

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    })

    if (!res.ok) {
      throw new Error("HTTP " + res.status)
    }

    const json = await res.json()

    console.log("RESULT:", json)

    if (json.status === "ok") {
      alert("สมัครสำเร็จ ✅")

      // 🔥 ปิด LIFF (optional)
      liff.closeWindow()

    } else {
      alert("สมัครไม่สำเร็จ ❌")
    }

  } catch (err) {
    console.error(err)
    alert("สมัครไม่สำเร็จ ❌")
  }
}

</script>

</body>
</html>
