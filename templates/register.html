<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสมาชิก</title>
    <!-- LINE LIFF SDK -->
    <script src="https://line-scdn.net"></script>
    
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #00b900; margin-top: 0; }
        .status-box { text-align: center; padding: 10px; margin-bottom: 20px; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .loading { background-color: #e3f2fd; color: #1976d2; }
        .error { background-color: #ffebee; color: #c62828; }
        .success { background-color: #e8f5e9; color: #2e7d32; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; 
            box-sizing: border-box; font-size: 16px; transition: border 0.3s;
        }
        input:focus { border-color: #00b900; outline: none; }
        
        button { 
            width: 100%; padding: 15px; background-color: #00b900; color: white; 
            border: none; border-radius: 8px; font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: background 0.3s; margin-top: 10px;
        }
        button:hover { background-color: #009900; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .footer-text { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>สมัครสมาชิก</h2>
    <div id="status-msg" class="status-box loading">กำลังโหลดระบบ...</div>

    <div id="register-form" style="display: none;">
        <input type="hidden" id="userId">
        
        <div class="form-group">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="name" placeholder="ระบุชื่อและนามสกุล">
        </div>

        <div class="form-group">
            <label>เบอร์โทรศัพท์</label>
            <input type="tel" id="phone" placeholder="เช่น 0812345678">
        </div>

        <div class="form-group">
            <label>บ้านเลขที่/หมู่</label>
            <input type="text" id="home" placeholder="เช่น 123/4 ม.5">
        </div>

        <div class="form-group">
            <label>ที่อยู่โดยละเอียด (ตำบล/อำเภอ/จังหวัด)</label>
            <textarea id="address" rows="3" placeholder="ระบุที่อยู่ของคุณ"></textarea>
        </div>

        <button id="btn-submit" onclick="submitForm()">ยืนยันสมัครสมาชิก</button>
        <p class="footer-text">ข้อมูลของคุณจะถูกเก็บเป็นความลับเพื่อใช้ในระบบสมาชิกเท่านั้น</p>
    </div>
</div>

<script>
    // ---------------------------------------------------------
    // 1. CONFIGURATION: ระบุ URL ของ Flask บน Cloud Run
    // ---------------------------------------------------------
    const BASE_URL = "https://server-ofm-419896870147.asia-southeast1.run.app";
    let OFM_NAME = "";

    // ---------------------------------------------------------
    // 2. HELPER: ดึงค่า OFM จาก URL หรือ Session
    // ---------------------------------------------------------
    function getOfmName() {
        const urlParams = new URLSearchParams(window.location.search);
        let ofm = urlParams.get('ofm');

        if (ofm) {
            // ถ้าเจอใน URL ให้เก็บไว้ใน Session กันหายตอน redirect
            sessionStorage.setItem('cached_ofm', ofm);
            return ofm;
        }
        // ถ้าไม่เจอใน URL ให้ไปดึงที่เคยเก็บไว้
        return sessionStorage.getItem('cached_ofm');
    }

    // ---------------------------------------------------------
    // 3. INITIALIZE APP
    // ---------------------------------------------------------
    async function initApp() {
        const statusEl = document.getElementById("status-msg");
        
        try {
            // ดึงชื่อร้าน
            OFM_NAME = getOfmName();

            if (!OFM_NAME) {
                showError("❌ ไม่พบรหัสร้านค้า (ofm) กรุณาเข้าผ่าน Line OA ของร้าน");
                return;
            }

            console.log("Fetching config for:", OFM_NAME);

            // ดึง Config จาก Flask
            const configRes = await fetch(`${BASE_URL}/config/${encodeURIComponent(OFM_NAME)}`);
            if (!configRes.ok) throw new Error("ไม่สามารถเชื่อมต่อ Server ได้");
            
            const config = await configRes.json();

            if (config.status !== "ok") {
                showError("❌ ไม่พบข้อมูลการตั้งค่าของร้าน: " + OFM_NAME);
                return;
            }

            // เริ่มต้น LIFF
            await liff.init({ liffId: config.liffId });

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById("userId").value = profile.userId;
                
                // โหลดสำเร็จ - แสดงฟอร์ม
                document.getElementById("register-form").style.display = "block";
                statusEl.innerText = "✅ พร้อมลงทะเบียน (" + OFM_NAME + ")";
                statusEl.className = "status-box success";
            }

        } catch (err) {
            console.error("Init Error:", err);
            showError("❌ เกิดข้อผิดพลาด: " + err.message);
        }
    }

    function showError(msg) {
        const statusEl = document.getElementById("status-msg");
        statusEl.innerText = msg;
        statusEl.className = "status-box error";
    }

    // ---------------------------------------------------------
    // 4. SUBMIT FORM
    // ---------------------------------------------------------
    async function submitForm() {
        const btn = document.getElementById("btn-submit");
        const statusEl = document.getElementById("status-msg");

        const data = {
            ofm: OFM_NAME,
            userId: document.getElementById("userId").value,
            name: document.getElementById("name").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            home: document.getElementById("home").value.trim(),
            address: document.getElementById("address").value.trim()
        };

        if (!data.name || !data.phone) {
            alert("กรุณากรอกชื่อและเบอร์โทรศัพท์");
            return;
        }

        btn.disabled = true;
        statusEl.innerText = "正在บันทึกข้อมูล...";

        try {
            const response = await fetch(`${BASE_URL}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.status === "ok") {
                alert("ยินดีด้วย! ลงทะเบียนสมาชิกสำเร็จ");
                liff.closeWindow(); 
            } else {
                throw new Error(result.message || "บันทึกไม่สำเร็จ");
            }
        } catch (err) {
            alert("เกิดข้อผิดพลาดในการส่งข้อมูล: " + err.message);
            btn.disabled = false;
        }
    }

    window.onload = initApp;
</script>

</body>
</html>
