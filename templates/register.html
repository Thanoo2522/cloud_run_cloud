<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>สมัครสมาชิก</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      font-size: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อติดต่อ">
<input id="home" placeholder="ชื่อหมู่บ้าน">
<input id="address" placeholder="ที่อยู่">
<input id="phone" placeholder="เบอร์โทร">

<button onclick="register()">สมัคร</button>

<script>

let API_URL = ""
let LIFF_ID = ""
let OFM = ""
let BASE_URL = ""
let CONFIG_URL = ""

// 🔥 ใช้ bootstrap จาก Flask (ต้องอยู่ domain เดียวกับ HTML)
const BOOTSTRAP_URL = "/bootstrap"

// ================= GET OFM =================
function getOfmFromUrl() {
  const params = new URLSearchParams(window.location.search)
  let ofm = params.get("ofm")

  // 🔥 fallback กัน LIFF query หาย
  if (!ofm) {
    const context = liff.getContext()
    if (context && context.referrer && context.referrer.extra) {
      ofm = context.referrer.extra.ofm
    }
  }

  return ofm
}

// ================= INIT =================
async function initApp() {
  try {

    // ✅ STEP 1: ขอค่าเริ่มต้นจาก Flask
    const bootRes = await fetch(BOOTSTRAP_URL)
    const boot = await bootRes.json()

    console.log("BOOT:", boot)

    if (boot.status !== "ok") {
      alert("❌ bootstrap error")
      return
    }

    const DEFAULT_LIFF_ID = boot.liffId
    CONFIG_URL = boot.configUrl

    if (!DEFAULT_LIFF_ID || !CONFIG_URL) {
      alert("❌ bootstrap ไม่ครบ")
      return
    }

    // ✅ STEP 2: init LIFF
    await liff.init({ liffId: DEFAULT_LIFF_ID })

    if (!liff.isLoggedIn()) {
      liff.login()
      return
    }

    // ✅ STEP 3: อ่าน ofm
    OFM = getOfmFromUrl()

    if (!OFM) {
      alert("❌ ไม่พบ ofm")
      console.log("URL:", window.location.href)
      console.log("CONTEXT:", liff.getContext())
      return
    }

    console.log("OFM:", OFM)

    // ✅ STEP 4: โหลด config ของแต่ละ OFM
    const res = await fetch(`${CONFIG_URL}/${OFM}`)
    const config = await res.json()

    console.log("CONFIG:", config)

    if (config.status !== "ok") {
      alert("❌ โหลด config ไม่สำเร็จ")
      return
    }

    BASE_URL = config.urlserver
    LIFF_ID = config.liffId
    API_URL = config.apiUrl

    console.log("BASE_URL:", BASE_URL)
    console.log("LIFF_ID:", LIFF_ID)

    if (!BASE_URL || !LIFF_ID || !API_URL) {
      alert("❌ config ไม่ครบ")
      return
    }

    // 🔥 re-init ถ้า LIFF_ID เปลี่ยน
    if (LIFF_ID !== DEFAULT_LIFF_ID) {
      console.log("🔄 re-init LIFF")
      await liff.init({ liffId: LIFF_ID })
    }

    console.log("✅ READY")

  } catch (err) {
    console.error("INIT ERROR:", err)
    alert("❌ โหลดระบบไม่สำเร็จ")
  }
}

initApp()

// ================= REGISTER =================
async function register() {
  try {

    const profile = await liff.getProfile()

    const name = document.getElementById("name").value
    const home = document.getElementById("home").value
    const address = document.getElementById("address").value
    const phone = document.getElementById("phone").value

    if (!name || !home || !address || !phone) {
      alert("กรุณากรอกข้อมูลให้ครบ")
      return
    }

    const data = {
      ofm: OFM,
      userId: profile.userId,
      name: name,
      home: home,
      address: address,
      phone: phone
    }

    console.log("SEND:", data)

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    })

    const json = await res.json()

    console.log("RESULT:", json)

    if (json.status === "ok") {
      alert("สมัครสำเร็จ ✅")
      liff.closeWindow()
    } else {
      alert("สมัครไม่สำเร็จ ❌")
    }

  } catch (err) {
    console.error("REGISTER ERROR:", err)
    alert("สมัครไม่สำเร็จ ❌")
  }
}

</script>

</body>
</html>
