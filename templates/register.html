<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>สมัครสมาชิก</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      font-size: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อติดต่อ">
<input id="home" placeholder="ชื่อหมู่บ้าน">
<input id="address" placeholder="ที่อยู่">
<input id="phone" placeholder="เบอร์โทร">

<button onclick="register()">สมัคร</button>

<script>

let API_URL = ""
let LIFF_ID = ""
let OFM = ""

// 🔥 เปลี่ยนเป็น URL Cloud Run ของคุณ
const BASE_URL = "https://server-ofm-419896870147.asia-southeast1.run.app"

// ================= GET OFM =================
function getOfmFromUrl() {
  const params = new URLSearchParams(window.location.search)
  return params.get("ofm")
}

// ================= INIT =================
async function initApp() {
  try {

    OFM = getOfmFromUrl()

    if (!OFM) {
      alert("❌ ไม่พบ ofm")
      return
    }

    console.log("OFM:", OFM)

    // ✅ โหลด config จาก Flask
    const res = await fetch(`${BASE_URL}/config/${OFM}`)
    const config = await res.json()

    console.log("CONFIG:", config)

    if (config.status !== "ok") {
      alert("❌ โหลด config ไม่สำเร็จ")
      return
    }

    LIFF_ID = config.liffId
    API_URL = config.apiUrl

    if (!LIFF_ID || !API_URL) {
      alert("❌ config ไม่ครบ")
      return
    }

    // ✅ init LIFF
    await liff.init({ liffId: LIFF_ID })

    if (!liff.isLoggedIn()) {
      liff.login()
      return
    }

    console.log("✅ LIFF READY")

  } catch (err) {
    console.error("INIT ERROR:", err)
    alert("โหลด config ไม่สำเร็จ")
  }
}

initApp()

// ================= REGISTER =================
async function register() {
  try {

    const profile = await liff.getProfile()

    const name = document.getElementById("name").value
    const home = document.getElementById("home").value
    const address = document.getElementById("address").value
    const phone = document.getElementById("phone").value

    if (!name || !home || !address || !phone) {
      alert("กรุณากรอกข้อมูลให้ครบ")
      return
    }

    const data = {
      ofm: OFM,
      userId: profile.userId,
      name: name,
      home: home,
      address: address,
      phone: phone
    }

    console.log("SEND:", data)

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    })

    const json = await res.json()

    console.log("RESULT:", json)

    if (json.status === "ok") {
      alert("สมัครสำเร็จ ✅")
      liff.closeWindow()
    } else {
      alert("สมัครไม่สำเร็จ ❌")
    }

  } catch (err) {
    console.error("REGISTER ERROR:", err)
    alert("สมัครไม่สำเร็จ ❌")
  }
}

</script>

</body>
</html>
