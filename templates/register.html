<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>สมัครสมาชิก</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: Arial; max-width: 400px; margin: auto; padding: 20px; }
    h2 { text-align: center; font-size: 20px; }
    input { width: 100%; padding: 10px; margin: 6px 0; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; font-size: 16px; background: #06c755; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #status { text-align: center; color: red; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>

<h2>สมัครสมาชิก</h2>
<div id="status"></div> <!-- สำหรับแจ้งเตือนสถานะ -->

<input id="name" placeholder="ชื่อติดต่อ">
<input id="home" placeholder="ชื่อหมู่บ้าน">
<input id="address" placeholder="ที่อยู่">
<input id="phone" placeholder="เบอร์โทร">

<button id="btn-reg" onclick="register()">สมัคร</button>

<script>
let API_URL = ""
let LIFF_ID = ""
let OFM = ""
const BASE_URL = "https://server-ofm-419896870147.asia-southeast1.run.app"

// ✅ ดึง OFM แบบกันหาย (SessionStorage)
function getOfmFromUrl() {
  const urlParams = new URLSearchParams(window.location.search)
  let ofm = urlParams.get("ofm")

  // 🔥 fallback กรณี LIFF redirect แล้ว query หาย
  if (!ofm) {
    const context = liff.getContext()
    if (context && context.referrer && context.referrer.extra) {
      ofm = context.referrer.extra.ofm
    }
  }

  return ofm
}

async function initApp() {
  const statusDiv = document.getElementById("status")
  try {
    OFM = getOfmFromUrl()
    if (!OFM) {
      statusDiv.innerText = "❌ ไม่พบรหัสร้านค้า (ofm)"
      return
    }

    // ✅ ใช้ encodeURIComponent เพื่อรองรับ "เชียงกลมออนไลน์" (ภาษาไทย)
    const res = await fetch(`${BASE_URL}/config/${encodeURIComponent(OFM)}`)
    const config = await res.json()

    console.log("SERVER CONFIG:", config)

    if (config.status !== "ok" || !config.liffId) {
      statusDiv.innerText = "❌ โหลด config ไม่สำเร็จ: " + (config.message || "Data Error")
      return
    }

    LIFF_ID = config.liffId.trim()
    API_URL = config.apiUrl ? config.apiUrl.trim() : `${BASE_URL}/register`

    // ✅ เริ่ม LIFF
    await liff.init({ liffId: LIFF_ID })

    if (!liff.isLoggedIn()) {
      liff.login()
    } else {
      statusDiv.style.color = "green"
      statusDiv.innerText = "✅ พร้อมลงทะเบียนร้าน: " + OFM
    }

  } catch (err) {
    console.error("INIT ERROR:", err)
    statusDiv.innerText = "❌ เกิดข้อผิดพลาดในการโหลด"
  }
}

initApp()

async function register() {
  try {
    const btn = document.getElementById("btn-reg")
    const profile = await liff.getProfile()
    const name = document.getElementById("name").value
    const home = document.getElementById("home").value
    const address = document.getElementById("address").value
    const phone = document.getElementById("phone").value

    if (!name || !home || !address || !phone) {
      alert("กรุณากรอกข้อมูลให้ครบ")
      return
    }

    btn.disabled = true
    const data = { ofm: OFM, userId: profile.userId, name, home, address, phone }

    const res = await fetch(`${BASE_URL}/register`, { // เปลี่ยนไปยิงที่ Flask โดยตรงชัวร์กว่า
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })

    const json = await res.json()
    if (json.status === "ok") {
      alert("สมัครสำเร็จ ✅")
      liff.closeWindow()
    } else {
      alert("สมัครไม่สำเร็จ ❌: " + json.message)
      btn.disabled = false
    }
  } catch (err) {
    alert("สมัครไม่สำเร็จ ❌")
    document.getElementById("btn-reg").disabled = false
  }
}
</script>
</body>
</html>
